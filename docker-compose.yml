services:
  timescaledb:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: solar_timescaledb
    environment:
      POSTGRES_DB: solar
      POSTGRES_USER: solar
      POSTGRES_PASSWORD: solar123
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solar -d solar"]
      interval: 10s
      timeout: 5s
      retries: 10

  grafana:
    image: grafana/grafana:11.1.0
    container_name: solar_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_USERS_DEFAULT_THEME: dark
      GRAFANA_POSTGRES_URL: ${GRAFANA_POSTGRES_URL:-timescaledb:5432}
      GRAFANA_POSTGRES_USER: ${GRAFANA_POSTGRES_USER:-solar}
      GRAFANA_POSTGRES_PASSWORD: ${GRAFANA_POSTGRES_PASSWORD:-solar123}
      GRAFANA_POSTGRES_DB: ${GRAFANA_POSTGRES_DB:-solar}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      timescaledb:
        condition: service_healthy

volumes:
  timescaledb_data:
  grafana_data:
