services:
  timescaledb:
    image: postgres:16
    container_name: solar_timescaledb_v2
    environment:
      POSTGRES_DB: solar
      POSTGRES_USER: solar
      POSTGRES_PASSWORD: solar123
    ports:
      - "5445:5432"
    volumes:
      - timescaledb_data_v2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solar -d solar"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - solar_network_v2

  grafana:
    image: grafana/grafana:11.4.0
    container_name: solar_grafana_v2
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_USERS_DEFAULT_THEME: dark
      GRAFANA_POSTGRES_URL: ${GRAFANA_POSTGRES_URL:-timescaledb:5432}
      GRAFANA_POSTGRES_USER: ${GRAFANA_POSTGRES_USER:-solar}
      GRAFANA_POSTGRES_PASSWORD: ${GRAFANA_POSTGRES_PASSWORD:-solar123}
      GRAFANA_POSTGRES_DB: ${GRAFANA_POSTGRES_DB:-solar}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data_v2:/var/lib/grafana
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - solar_network_v2

volumes:
  timescaledb_data_v2:
  grafana_data_v2:

networks:
  solar_network_v2:
    name: solar_network_v2
    driver: bridge
